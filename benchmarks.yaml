# JVM Build Tools Benchmark Configuration
#
# hyperfine:    global benchmark parameters shared by all tools
# build_tools:  per-tool install and shutdown commands (defined once, shared across all repos)
# repos:        external repositories to clone and compile
# tools:        one entry per (tool, repo) combination
#
# Fields in `hyperfine`:
#   benchmark_types.<name>.warmup - unmeasured warmup runs for the named benchmark type
#   benchmark_types.<name>.runs   - measured runs for the named benchmark type
#
# Fields in `build_tools.<name>`:
#   install  - how to install the tool on a fresh CI runner
#   shutdown - clean up daemons / processes after benchmarking
#
# Fields per repo:
#   name    - unique identifier for the repo
#   url     - git URL to clone
#   ref     - branch, tag, or commit SHA to checkout
#   setup   - optional shell command run once after cloning/updating (e.g. remove broken test files)
#
# Fields per tool entry:
#   build_tool_name   - build tool label used in result filenames and overlays; must match a key in build_tools
#   repo              - matches a name in `repos`; combined with build_tool_name to form a unique benchmark id
#   setup             - run once before hyperfine (download deps, warm daemon)
#   benchmarks.<name>.command      - shell command measured by hyperfine
#   benchmarks.<name>.touch_files  - files to `touch` before the benchmark run (optional)
#
# Build file overlays: if build-files/<repo>/<tool>/ exists in this repo,
# its contents are automatically copied into the cloned repo before benchmarking.

hyperfine:
  benchmark_types:
    compile-clean:
      warmup: 2
      runs: 10
    compile-incremental:
      warmup: 1
      runs: 10
    test:
      warmup: 1
      runs: 10
    compile-single-module:
      warmup: 2
      runs: 10
    compile-all-modules:
      warmup: 2
      runs: 10

build_tools:
  maven:
    install: "echo 'Maven is pre-installed on ubuntu-latest'"
    shutdown: ""
  mill:
    install: |
      curl -L https://repo1.maven.org/maven2/com/lihaoyi/mill-dist/1.1.5/mill-dist-1.1.5-mill.sh -o mill
      chmod +x mill
      sudo mv mill /usr/local/bin/mill
    shutdown: "mill shutdown || true"
  deder:
    install: "brew install sake92/tap/deder"
    shutdown: "deder shutdown || true"
  bleep:
    install: |
      BLEEP_VERSION=v1.0.0-M9
      case "$(uname -s)-$(uname -m)" in
        Linux-x86_64)   BLEEP_ASSET=bleep-x86_64-pc-linux.tar.gz ;;
        Linux-aarch64)  BLEEP_ASSET=bleep-arm64-pc-linux.tar.gz ;;
        Linux-arm64)    BLEEP_ASSET=bleep-arm64-pc-linux.tar.gz ;;
        Darwin-arm64)   BLEEP_ASSET=bleep-arm64-apple-darwin.tar.gz ;;
        Darwin-x86_64)  BLEEP_ASSET=bleep-x86_64-apple-darwin.tar.gz ;;
        *)
          echo "Unsupported platform for bleep: $(uname -s)-$(uname -m)" >&2
          exit 1
          ;;
      esac
      wget -qO bleep.tar.gz \
        "https://github.com/oyvindberg/bleep/releases/download/${BLEEP_VERSION}/${BLEEP_ASSET}"
      tar xf bleep.tar.gz
      sudo mv bleep /usr/local/bin/bleep
      rm -f bleep.tar.gz
    shutdown: ""
  gradle:
    install: "chmod +x gradlew || true"
    shutdown: "./gradlew --stop || pkill -f GradleDaemon || true"
  sbt:
    install: |
      sudo apt-get update
      sudo apt-get install apt-transport-https curl gnupg -yqq
      echo "deb https://repo.scala-sbt.org/scalasbt/debian all main" | sudo tee /etc/apt/sources.list.d/sbt.list
      echo "deb https://repo.scala-sbt.org/scalasbt/debian /" | sudo tee /etc/apt/sources.list.d/sbt_old.list
      curl -sL "https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x2EE0EA64E40A89B84B2DF73499E82A75642AC823" | sudo -H gpg --no-default-keyring --keyring gnupg-ring:/etc/apt/trusted.gpg.d/scalasbt-release.gpg --import
      sudo chmod 644 /etc/apt/trusted.gpg.d/scalasbt-release.gpg
      sudo apt-get update
      sudo apt-get install sbt -y
    shutdown: "sbt --client shutdown || true"
  sbt2:
    install: |
      sudo apt-get update
      sudo apt-get install apt-transport-https curl gnupg -yqq
      echo "deb https://repo.scala-sbt.org/scalasbt/debian all main" | sudo tee /etc/apt/sources.list.d/sbt.list
      echo "deb https://repo.scala-sbt.org/scalasbt/debian /" | sudo tee /etc/apt/sources.list.d/sbt_old.list
      curl -sL "https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x2EE0EA64E40A89B84B2DF73499E82A75642AC823" | sudo -H gpg --no-default-keyring --keyring gnupg-ring:/etc/apt/trusted.gpg.d/scalasbt-release.gpg --import
      sudo chmod 644 /etc/apt/trusted.gpg.d/scalasbt-release.gpg
      sudo apt-get update
      sudo apt-get install sbt -y
    shutdown: "sbt --client shutdown || true"

repos:
  - name: java-algorithms
    url: https://github.com/TheAlgorithms/Java
    ref: 49f9e1a5a7c041a6b40db52b089b480e897b89b5  # master @ 2026-04-10
    setup: "rm -f src/test/java/com/thealgorithms/conversions/AffineConverterTest.java"

  - name: scala-algorithms
    url: https://github.com/TheAlgorithms/Scala
    ref: de555349d5effb87962d3116eb08c9f374065112  # master @ 2026-04-10

  - name: mockito
    url: https://github.com/mockito/mockito
    ref: 97f3574cc07fdf36f1f76ba7332ac57675e140b1  # old monorepo layout with subprojects/

tools:
  ######### java-algorithms #########
  # ── java-algorithms: Maven ──────────────────────────────────────────────────────────
  - build_tool_name: maven
    repo: java-algorithms
    setup: "mvn dependency:resolve -q"
    benchmarks:
      compile-clean:
        command: "mvn clean compile -q"
      compile-incremental:
        command: "mvn compile -q"
        touch_files:
          - src/main/java/com/thealgorithms/sorts/BubbleSort.java
          - src/main/java/com/thealgorithms/sorts/MergeSort.java
          - src/main/java/com/thealgorithms/sorts/QuickSort.java
          - src/main/java/com/thealgorithms/sorts/HeapSort.java
          - src/main/java/com/thealgorithms/sorts/InsertionSort.java
          - src/main/java/com/thealgorithms/sorts/SelectionSort.java
      test:
        command: "mvn test -q -DforkCount=8 -DreuseForks=true"

  # ── java-algorithms: Mill ───────────────────────────────────────────────────────────
  # build-files/java-algorithms/mill/ is copied over the cloned repo
  - build_tool_name: mill
    repo: java-algorithms
    setup: "mill __.compile"
    benchmarks:
      compile-clean:
        command: "mill clean && mill __.compile"
      compile-incremental:
        command: "mill __.compile"
        touch_files:
          - src/main/java/com/thealgorithms/sorts/BubbleSort.java
          - src/main/java/com/thealgorithms/sorts/MergeSort.java
          - src/main/java/com/thealgorithms/sorts/QuickSort.java
          - src/main/java/com/thealgorithms/sorts/HeapSort.java
          - src/main/java/com/thealgorithms/sorts/InsertionSort.java
          - src/main/java/com/thealgorithms/sorts/SelectionSort.java
      test:
        command: "mill __.test"

  # ── java-algorithms: Deder ───────────────────────────────────────────────────────────
  - build_tool_name: deder
    repo: java-algorithms
    setup: "deder exec -t compile"
    benchmarks:
      compile-clean:
        command: "deder clean && deder exec -t compile"
      compile-incremental:
        command: "deder exec -t compile"
        touch_files:
          - src/main/java/com/thealgorithms/sorts/BubbleSort.java
          - src/main/java/com/thealgorithms/sorts/MergeSort.java
          - src/main/java/com/thealgorithms/sorts/QuickSort.java
          - src/main/java/com/thealgorithms/sorts/HeapSort.java
          - src/main/java/com/thealgorithms/sorts/InsertionSort.java
          - src/main/java/com/thealgorithms/sorts/SelectionSort.java
      test:
        command: "deder exec -t test"

  # temp removed because it doesnt actually clean the cache
  # bloop files are stored somewhere globally ???
  # ── java-algorithms: Bleep ───────────────────────────────────────────────────────────
  # build-files/java-algorithms/bleep/ is copied over the cloned repo
  #- build_tool_name: bleep
  #  repo: java-algorithms
  #  setup: "bleep compile algorithms-test"
  #  benchmarks:
  #    compile-clean:
  #      command: "bleep clean && bleep compile algorithms"
  #    compile-incremental:
  #      command: "bleep compile algorithms"
  #      touch_files:
  #        - src/main/java/com/thealgorithms/sorts/BubbleSort.java
  #        - src/main/java/com/thealgorithms/sorts/MergeSort.java
  #    test:
  #      command: "bleep test algorithms-test"

  # ── java-algorithms: sbt ────────────────────────────────────────────────────────────
  # build-files/java-algorithms/sbt/ is copied over the cloned repo
  - build_tool_name: sbt
    repo: java-algorithms
    setup: "sbt --client compile"
    benchmarks:
      compile-clean:
        command: "sbt --client 'clean; test:clean; compile; test:compile'"
      compile-incremental:
        command: "sbt --client compile"
        touch_files:
          - src/main/java/com/thealgorithms/sorts/BubbleSort.java
          - src/main/java/com/thealgorithms/sorts/MergeSort.java
          - src/main/java/com/thealgorithms/sorts/QuickSort.java
          - src/main/java/com/thealgorithms/sorts/HeapSort.java
          - src/main/java/com/thealgorithms/sorts/InsertionSort.java
          - src/main/java/com/thealgorithms/sorts/SelectionSort.java
      test:
        command: "sbt --client test"

  # ── java-algorithms: sbt2 ───────────────────────────────────────────────────────────
  # build-files/java-algorithms/sbt2/ is copied over the cloned repo (sbt 2.0.0-RC12)
  - build_tool_name: sbt2
    repo: java-algorithms
    setup: "sbt --client compile"
    benchmarks:
      compile-clean:
        command: "sbt --client 'clean; Test/clean; compile; Test/compile'"
      compile-incremental:
        command: "sbt --client compile"
        touch_files:
          - src/main/java/com/thealgorithms/sorts/BubbleSort.java
          - src/main/java/com/thealgorithms/sorts/MergeSort.java
          - src/main/java/com/thealgorithms/sorts/QuickSort.java
          - src/main/java/com/thealgorithms/sorts/HeapSort.java
          - src/main/java/com/thealgorithms/sorts/InsertionSort.java
          - src/main/java/com/thealgorithms/sorts/SelectionSort.java
      test:
        command: "sbt --client test"

  ######### scala-algorithms #########
  # ── scala-algorithms: sbt ───────────────────────────────────────────────────────────
  - build_tool_name: sbt
    repo: scala-algorithms
    setup: |
      # scala version is old; use gsed on macOS, sed on Linux
      $(command -v gsed 2>/dev/null || echo sed) -i 's/scalaVersion := "2.13.6",/scalaVersion := "2.13.11",/g' build.sbt
      sbt --client compile
    benchmarks:
      compile-clean:
        command: |
          sbt --client 'clean; test:clean; compile; test:compile'
      compile-incremental:
        command: "sbt --client compile"
        touch_files:
          - src/main/scala/Sort/BubbleSort.scala
          - src/main/scala/Sort/MergeSort.scala
          - src/main/scala/Sort/QuickSort.scala
          - src/main/scala/Sort/HeapSort.scala
          - src/main/scala/Sort/InsertionSort.scala
          - src/main/scala/Sort/SelectionSort.scala
      test:
        command: "sbt --client test"

  # ── scala-algorithms: sbt2 ──────────────────────────────────────────────────────────
  # build-files/scala-algorithms/sbt2/ is copied over the cloned repo (sbt 2.0.0-RC12)
  - build_tool_name: sbt2
    repo: scala-algorithms
    setup: |
      # scala version is old; use gsed on macOS, sed on Linux
      $(command -v gsed 2>/dev/null || echo sed) -i 's/scalaVersion := "2.13.6",/scalaVersion := "2.13.11",/g' build.sbt
      sbt --client compile
    benchmarks:
      compile-clean:
        command: |
          sbt --client 'clean; Test/clean; compile; Test/compile'
      compile-incremental:
        command: "sbt --client compile"
        touch_files:
          - src/main/scala/Sort/BubbleSort.scala
          - src/main/scala/Sort/MergeSort.scala
          - src/main/scala/Sort/QuickSort.scala
          - src/main/scala/Sort/HeapSort.scala
          - src/main/scala/Sort/InsertionSort.scala
          - src/main/scala/Sort/SelectionSort.scala
      test:
        command: "sbt --client test"

  # ── scala-algorithms: Deder ───────────────────────────────────────────────────────────
  - build_tool_name: deder
    repo: scala-algorithms
    setup: "deder exec -t compile"
    benchmarks:
      compile-clean:
        command: "deder clean && deder exec -t compile"
      compile-incremental:
        command: "deder exec -t compile"
        touch_files:
          - src/main/scala/Sort/BubbleSort.scala
          - src/main/scala/Sort/MergeSort.scala
          - src/main/scala/Sort/QuickSort.scala
          - src/main/scala/Sort/HeapSort.scala
          - src/main/scala/Sort/InsertionSort.scala
          - src/main/scala/Sort/SelectionSort.scala
      test:
        command: "deder exec -t testInMemory"

  # ── scala-algorithms: Bleep ──────────────────────────────────────────────────────────
  # build-files/scala-algorithms/bleep/ is copied over the cloned repo
  #- build_tool_name: bleep
  #  repo: scala-algorithms
  #  setup: "bleep compile algorithms-test"
  #  benchmarks:
  #    compile-clean:
  #      command: "bleep clean && bleep compile algorithms"
  #    compile-incremental:
  #      command: "bleep compile algorithms"
  #      touch_files:
  #        - src/main/scala/Sort/BubbleSort.scala
  #        - src/main/scala/Sort/MergeSort.scala
  #    test:
  #      command: "bleep test algorithms-test"

  # ── scala-algorithms: Mill ──────────────────────────────────────────────────────────
  # build-files/scala-algorithms/mill/ is copied over the cloned repo
  - build_tool_name: mill
    repo: scala-algorithms
    setup: "mill __.compile"
    benchmarks:
      compile-clean:
        command: "mill clean && mill __.compile"
      compile-incremental:
        command: "mill __.compile"
        touch_files:
          - src/main/scala/Sort/BubbleSort.scala
          - src/main/scala/Sort/MergeSort.scala
          - src/main/scala/Sort/QuickSort.scala
          - src/main/scala/Sort/HeapSort.scala
          - src/main/scala/Sort/InsertionSort.scala
          - src/main/scala/Sort/SelectionSort.scala
      test:
        command: "mill __.testLocal"

  ######### mockito #########
  # ── mockito: Gradle (native) ──────────────────────────────────
  - build_tool_name: gradle
    repo: mockito
    setup: "./gradlew tasks --no-build-cache -q || true"
    benchmarks:
      compile-single-module:
        command: "./gradlew clean :mockito-core:compileJava --no-build-cache -q"
      compile-all-modules:
        command: "./gradlew clean compileJava --no-build-cache -q"

  # ── mockito: Mill ─────────────────────────────────────────────
  # build-files/mockito/mill/ is copied over the cloned repo
  - build_tool_name: mill
    repo: mockito
    setup: "mill __.compile"
    benchmarks:
      compile-single-module:
        command: "mill clean __ && mill mockito-core.compile"
      compile-all-modules:
        command: "mill clean __ && mill __.compile"

  # ── mockito: Deder ────────────────────────────────────────────
  # build-files/mockito/deder/ is copied over the cloned repo
  - build_tool_name: deder
    repo: mockito
    setup: "deder exec -t compile"
    benchmarks:
      compile-single-module:
        command: "deder clean && deder exec -t compile -m mockito-core"
      compile-all-modules:
        command: "deder clean && deder exec -t compile"
