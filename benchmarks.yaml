# JVM Build Tools Benchmark Configuration
#
# hyperfine:    global benchmark parameters shared by all tools
# build_tools:  per-tool install and shutdown commands (defined once, shared across all repos)
# repos:        external repositories to clone and compile
# tools:        benchmark entries, optionally with named incremental/test variants per repo/tool
#
# Fields in `hyperfine`:
#   clean_compile.warmup       - unmeasured warmup runs before clean compile benchmark
#   clean_compile.runs         - measured runs for clean compile benchmark
#   incremental_compile.warmup - unmeasured warmup runs before incremental compile benchmark
#   incremental_compile.runs   - measured runs for incremental compile benchmark
#   test_all.warmup - unmeasured warmup runs before test benchmark
#   test_all.runs   - measured runs for test benchmark
#
# Fields in `build_tools.<name>`:
#   install  - how to install the tool on a fresh CI runner
#   shutdown - clean up daemons / processes after benchmarking
#
# Fields per repo:
#   name    - unique identifier for the repo
#   url     - git URL to clone
#   ref     - branch, tag, or commit SHA to checkout
#   setup   - optional shell command run once after cloning/updating (e.g. remove broken test files)
#   build_tool_name     - build tool used for installs/overlays; must match a key in build_tools
#   benchmark_id         - optional unique benchmark id passed to run_bench.sh; defaults to <repo>-<build_tool_name>
#   result_label         - optional label used in result filenames/charts; defaults to build_tool_name
#   repo                 - matches a name in `repos`
#   setup                - run once before hyperfine (download deps, warm daemon)
#   compile_clean        - full clean + compile command measured by hyperfine
#   compile_incremental  - single incremental compile command (after touching files)
#   incremental_files    - files to `touch` before the single incremental run
#   incremental_variants - named incremental compile variants; each variant may define setup, command, incremental_files
#   test_all             - single test command
#   test_variants        - named test variants; each variant may define setup and command
#
# Build file overlays: if build-files/<repo>/<tool>/ exists in this repo,
# its contents are automatically copied into the cloned repo before benchmarking.

hyperfine:
  clean_compile:
    warmup: 2
    runs: 10
  incremental_compile:
    warmup: 1
    runs: 10
  test_all:
    warmup: 1
    runs: 10

build_tools:
  maven:
    install: "echo 'Maven is pre-installed on ubuntu-latest'"
    shutdown: ""
  mill:
    install: |
      curl -L https://repo1.maven.org/maven2/com/lihaoyi/mill-dist/1.1.2/mill-dist-1.1.2-mill.sh -o mill
      chmod +x mill
      sudo mv mill /usr/local/bin/mill
    shutdown: "mill shutdown || true"
  deder:
    install: "brew install sake92/tap/deder"
    shutdown: "deder shutdown || true"
  sbt:
    install: |
      sudo apt-get update
      sudo apt-get install apt-transport-https curl gnupg -yqq
      echo "deb https://repo.scala-sbt.org/scalasbt/debian all main" | sudo tee /etc/apt/sources.list.d/sbt.list
      echo "deb https://repo.scala-sbt.org/scalasbt/debian /" | sudo tee /etc/apt/sources.list.d/sbt_old.list
      curl -sL "https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x2EE0EA64E40A89B84B2DF73499E82A75642AC823" | sudo -H gpg --no-default-keyring --keyring gnupg-ring:/etc/apt/trusted.gpg.d/scalasbt-release.gpg --import
      sudo chmod 644 /etc/apt/trusted.gpg.d/scalasbt-release.gpg
      sudo apt-get update
      sudo apt-get install sbt -y
    shutdown: "sbt --client shutdown || true"

repos:
  - name: slf4j
    url: https://github.com/qos-ch/slf4j
    ref: d2073bece8310017914e1ff65d7107b2d4869c7d  # master @ 2025-11-24

  - name: java-algorithms
    url: https://github.com/TheAlgorithms/Java
    ref: 49f9e1a5a7c041a6b40db52b089b480e897b89b5  # master @ 2026-04-10
    setup: "rm -f src/test/java/com/thealgorithms/conversions/AffineConverterTest.java"

  - name: scala-algorithms
    url: https://github.com/TheAlgorithms/Scala
    ref: de555349d5effb87962d3116eb08c9f374065112  # master @ 2026-04-10

tools:
  ######### slf4j #########
  # ── slf4j: Maven (single repo+tool entry with named variants) ───────────────────────────
  - build_tool_name: maven
    repo: slf4j
    setup: "mvn install -DskipTests -q"
    compile_clean: "mvn clean compile -DskipTests -q"
    incremental_variants:
      api:
        setup: "mvn -pl slf4j-api -am install -DskipTests -q"
        command: "mvn -pl slf4j-api -am compile -DskipTests -q"
        incremental_files:
          - slf4j-api/src/main/java/org/slf4j/Logger.java
          - slf4j-api/src/main/java/org/slf4j/LoggerFactory.java
      simple:
        setup: "mvn -pl slf4j-simple -am install -DskipTests -q"
        command: "mvn -pl slf4j-simple -am compile -DskipTests -q"
        incremental_files:
          - slf4j-simple/src/main/java/org/slf4j/simple/SimpleLogger.java
          - slf4j-simple/src/main/java/org/slf4j/simple/SimpleLoggerConfiguration.java
      reactor:
        setup: "mvn install -DskipTests -q"
        command: "mvn compile -DskipTests -q"
        incremental_files:
          - slf4j-api/src/main/java/org/slf4j/Logger.java
          - slf4j-simple/src/main/java/org/slf4j/simple/SimpleLogger.java
    test_variants:
      api:
        setup: "mvn -pl slf4j-api -am install -DskipTests -q"
        command: "mvn -pl slf4j-api -am test -q"
      simple:
        setup: "mvn -pl slf4j-simple -am install -DskipTests -q"
        command: "mvn -pl slf4j-simple -am test -q"
      reactor:
        setup: "mvn install -DskipTests -q"
        command: "mvn test -q"

  ######### java-algorithms #########
  # ── java-algorithms: Maven ──────────────────────────────────────────────────────────
  - build_tool_name: maven
    repo: java-algorithms
    setup: "mvn dependency:resolve -q"
    compile_clean: "mvn clean compile -q"
    compile_incremental: "mvn compile -q"
    incremental_files:
      - src/main/java/com/thealgorithms/sorts/BubbleSort.java
      - src/main/java/com/thealgorithms/sorts/MergeSort.java
    test_all: "mvn test -q -DforkCount=8 -DreuseForks=true"

  # ── java-algorithms: Mill ───────────────────────────────────────────────────────────
  # build-files/java-algorithms/mill/ is copied over the cloned repo
  - build_tool_name: mill
    repo: java-algorithms
    setup: "mill __.compile"
    compile_clean: "mill clean && mill __.compile"
    compile_incremental: "mill __.compile"
    incremental_files:
      - src/main/java/com/thealgorithms/sorts/BubbleSort.java
      - src/main/java/com/thealgorithms/sorts/MergeSort.java
    test_all: "mill __.test"

  # ── java-algorithms: Deder ───────────────────────────────────────────────────────────
  - build_tool_name: deder
    repo: java-algorithms
    setup: "deder exec -t compile"
    compile_clean: "deder clean && deder exec -t compile"
    compile_incremental: "deder exec -t compile"
    incremental_files:
      - src/main/java/com/thealgorithms/sorts/BubbleSort.java
      - src/main/java/com/thealgorithms/sorts/MergeSort.java
    test_all: "deder exec -t test"

  # ── java-algorithms: sbt ────────────────────────────────────────────────────────────
  # build-files/java-algorithms/sbt/ is copied over the cloned repo
  - build_tool_name: sbt
    repo: java-algorithms
    setup: "sbt --client compile"
    compile_clean: "sbt --client 'clean; test:clean; compile; test:compile'"
    compile_incremental: "sbt --client compile"
    incremental_files:
      - src/main/java/com/thealgorithms/sorts/BubbleSort.java
      - src/main/java/com/thealgorithms/sorts/MergeSort.java
    test_all: "sbt --client test"

  ######### scala-algorithms #########
  # ── scala-algorithms: sbt ───────────────────────────────────────────────────────────
  - build_tool_name: sbt
    repo: scala-algorithms
    setup: |
      # scala version is old; use gsed on macOS, sed on Linux
      $(command -v gsed 2>/dev/null || echo sed) -i 's/scalaVersion := "2.13.6",/scalaVersion := "2.13.11",/g' build.sbt
      sbt --client compile
    compile_clean: |
      sbt --client 'clean; test:clean; compile; test:compile'
    compile_incremental: "sbt --client compile"
    incremental_files:
      - src/main/scala/Sort/BubbleSort.scala
      - src/main/scala/Sort/MergeSort.scala
    test_all: "sbt --client test"

  # ── scala-algorithms: Deder ───────────────────────────────────────────────────────────
  - build_tool_name: deder
    repo: scala-algorithms
    setup: "deder exec -t compile"
    compile_clean: "deder clean && deder exec -t compile"
    compile_incremental: "deder exec -t compile"
    incremental_files:
      - src/main/scala/Sort/BubbleSort.scala
      - src/main/scala/Sort/MergeSort.scala
    test_all: "deder exec -t testInMemory"

  # ── scala-algorithms: Mill ──────────────────────────────────────────────────────────
  # build-files/scala-algorithms/mill/ is copied over the cloned repo
  - build_tool_name: mill
    repo: scala-algorithms
    setup: "mill __.compile"
    compile_clean: "mill clean && mill __.compile"
    compile_incremental: "mill __.compile"
    incremental_files:
      - src/main/scala/Sort/BubbleSort.scala
      - src/main/scala/Sort/MergeSort.scala
    test_all: "mill __.testLocal"


