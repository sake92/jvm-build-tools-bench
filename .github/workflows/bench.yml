name: JVM Build Tools Benchmark

on:
  pull_request:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - benchmarks.yaml
      - run_bench.scala
      - bench.scala
      - aggregate.scala
      - build-files/**
      - .github/workflows/bench.yml

jobs:
  # ── Step 1: read tool names from benchmarks.yaml and build a matrix ──────
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - uses: coursier/cache-action@v7
      - name: Install scala-cli
        uses: VirtusLab/scala-cli-setup@v1
        with:
          jvm: temurin:21
      - name: Build benchmark matrix from benchmarks.yaml
        id: set-matrix
        run: |
          benchmarks=$(scala-cli run run_bench.scala -- --list-benchmarks)
          echo "matrix={\"benchmark\":$benchmarks}" >> "$GITHUB_OUTPUT"

  # ── Step 2: one fresh runner per tool ─────────────────────────────────────
  bench:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
      fail-fast: false   # don't cancel other tools if one fails
    steps:
      - uses: actions/checkout@v4
      - uses: coursier/cache-action@v7
        with:
          extraFiles: deder.pkl
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Install scala-cli
        uses: VirtusLab/scala-cli-setup@v1
        with:
          jvm: temurin:21
      - name: Install hyperfine
        run: |
          HYPERFINE_VERSION=v1.18.0
          wget -qO hyperfine.tar.gz \
            "https://github.com/sharkdp/hyperfine/releases/download/${HYPERFINE_VERSION}/hyperfine-${HYPERFINE_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          tar xf hyperfine.tar.gz
          sudo mv "hyperfine-${HYPERFINE_VERSION}-x86_64-unknown-linux-musl/hyperfine" /usr/local/bin/
          rm -rf hyperfine.tar.gz hyperfine-*/
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main
      - name: Install build tool
        run: |
          scala-cli run run_bench.scala -- --install-cmd --benchmark "${{ matrix.benchmark }}"
      - name: Run benchmark
        run: |
          scala-cli run run_bench.scala -- \
            --benchmark "${{ matrix.benchmark }}" \
            --results-dir results/ \
            --repos-dir "${{ runner.temp }}/bench-repos"
      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()   # upload even on partial failure
        with:
          name: results-${{ matrix.benchmark }}
          path: results/
          retention-days: 90

  # ── Step 3: aggregate all results into a single comparison ────────────────
  aggregate:
    needs: bench
    runs-on: ubuntu-latest
    if: always()   # run even if some bench jobs failed
    steps:
      - uses: actions/checkout@v4
      - uses: coursier/cache-action@v7
      - name: Install scala-cli
        uses: VirtusLab/scala-cli-setup@v1
        with:
          jvm: temurin:21
      - name: Download all benchmark artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: results-*
          path: all-results/
          merge-multiple: false
      - name: Aggregate results
        run: |
          scala-cli run aggregate.scala -- \
            --results-dir all-results/ \
            --output-dir aggregated/ \
            --benchmarks-yaml benchmarks.yaml
      - name: Upload aggregated results
        uses: actions/upload-artifact@v4
        with:
          name: results-aggregated
          path: aggregated/
          retention-days: 90

  # ── Step 4: publish index.html + charts to GitHub Pages ───────────────────
  deploy-pages:
    needs: aggregate
    runs-on: ubuntu-latest
    if: always() && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: results-aggregated
          path: aggregated/
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: aggregated/
          keep_files: false
